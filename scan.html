<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scan QR — Satu Cakrawala WAHA</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background:#0f172a; color:#e2e8f0; min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .container { text-align:center; max-width:420px; width:100%; padding:20px; }
  h1 { font-size:1.5rem; margin-bottom:4px; }
  .subtitle { color:#94a3b8; font-size:0.9rem; margin-bottom:24px; }
  .status { padding:8px 16px; border-radius:8px; font-size:0.85rem; margin-bottom:20px; display:inline-block; }
  .status.scanning { background:#fbbf2420; color:#fbbf24; border:1px solid #fbbf2440; }
  .status.connected { background:#22c55e20; color:#22c55e; border:1px solid #22c55e40; }
  .status.error { background:#ef444420; color:#ef4444; border:1px solid #ef444440; }
  .qr-box { background:#1e293b; border-radius:16px; padding:24px; margin-bottom:16px; border:1px solid #334155; }
  .qr-box img { width:280px; height:280px; border-radius:8px; image-rendering:pixelated; }
  .qr-box .loader { width:280px; height:280px; border-radius:8px; background:#334155; display:flex; align-items:center; justify-content:center; margin:0 auto; }
  .qr-box .loader span { color:#64748b; }
  .info { font-size:0.8rem; color:#64748b; margin-top:8px; }
  .timer { font-size:0.8rem; color:#94a3b8; margin-bottom:16px; }
  .btn { background:#3b82f6; color:white; border:none; padding:10px 24px; border-radius:8px; font-size:0.9rem; cursor:pointer; margin-top:12px; }
  .btn:hover { background:#2563eb; }
  .steps { text-align:left; background:#1e293b; border-radius:12px; padding:16px 20px; margin-top:20px; border:1px solid #334155; }
  .steps h3 { font-size:0.9rem; margin-bottom:10px; color:#94a3b8; }
  .steps ol { padding-left:20px; font-size:0.85rem; line-height:1.8; }
  .pulse { animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{ opacity:1; } 50%{ opacity:0.5; } }
</style>
</head>
<body>
<div class="container">
  <h1>📡 Satu Cakrawala</h1>
  <p class="subtitle">WAHA WhatsApp Gateway — QR Login</p>
  
  <div id="status" class="status scanning">⏳ Memuat QR Code...</div>
  
  <div class="qr-box">
    <div id="qr-content">
      <div class="loader"><span class="pulse">Loading QR...</span></div>
    </div>
  </div>
  
  <p class="timer" id="timer"></p>
  <p class="info">QR auto-refresh setiap 20 detik</p>
  <button class="btn" onclick="refreshQR()">🔄 Refresh QR</button>
  
  <div class="steps">
    <h3>Cara Scan:</h3>
    <ol>
      <li>Buka <b>WhatsApp</b> di HP</li>
      <li>Menu ⋮ → <b>Perangkat Tertaut</b></li>
      <li>Tap <b>Tautkan Perangkat</b></li>
      <li><b>Scan QR</b> di atas</li>
    </ol>
  </div>
</div>

<script>
const API_URL = window.location.origin;
const API_KEY = '4c94510d4aaf48bbb286aaeb65a0bcdf';
let countdown = 20;
let interval;

async function checkStatus() {
  try {
    const res = await fetch(API_URL + '/api/sessions/default', {
      headers: { 'X-Api-Key': API_KEY }
    });
    const data = await res.json();
    
    const el = document.getElementById('status');
    if (data.status === 'WORKING') {
      el.className = 'status connected';
      el.innerHTML = '✅ WhatsApp Connected! Bot aktif dan siap digunakan.';
      document.getElementById('qr-content').innerHTML = '<div style="font-size:64px">✅</div><p style="margin-top:12px;color:#22c55e;font-weight:bold">Connected!</p>';
      clearInterval(interval);
      return true;
    } else if (data.status === 'SCAN_QR_CODE') {
      el.className = 'status scanning';
      el.innerHTML = '📱 Scan QR Code untuk login';
      refreshQR();
    }
  } catch(e) {
    document.getElementById('status').className = 'status error';
    document.getElementById('status').innerHTML = '❌ Gagal connect ke WAHA API';
  }
  return false;
}

async function refreshQR() {
  countdown = 20;
  try {
    const res = await fetch(API_URL + '/api/default/auth/qr', {
      headers: { 'X-Api-Key': API_KEY, 'Accept': 'image/png' }
    });
    if (res.ok) {
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      document.getElementById('qr-content').innerHTML = '<img src="' + url + '" alt="QR Code">';
    } else {
      document.getElementById('qr-content').innerHTML = '<div class="loader"><span>QR belum tersedia</span></div>';
    }
  } catch(e) {
    document.getElementById('qr-content').innerHTML = '<div class="loader"><span>Error loading QR</span></div>';
  }
}

function startTimer() {
  interval = setInterval(async () => {
    countdown--;
    document.getElementById('timer').textContent = 'Refresh dalam ' + countdown + ' detik';
    
    if (countdown <= 0) {
      const connected = await checkStatus();
      if (!connected) {
        await refreshQR();
        countdown = 20;
      }
    }
  }, 1000);
}

// Start
checkStatus().then(() => startTimer());
</script>
</body>
</html>
