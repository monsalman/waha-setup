services:
  # --- WhatsApp transport (unchanged) ---
  waha:
    image: devlikeapro/waha:latest
    container_name: satu-cakrawala-waha
    restart: always
    ports:
      - "3001:3000"
    env_file:
      - .env
    volumes:
      # Session data - persist agar WhatsApp tetap login setelah restart
      - ./.sessions:/app/.sessions
      # Media files - gambar, video, dokumen yang diterima/dikirim
      - ./.media:/app/.media
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -H \"X-Api-Key: $$WAHA_API_KEY\" http://localhost:3000/api/sessions || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # --- Backend logic (Python/FastAPI) = the "waha-gateway backend" ---
  backend:
    build: ./backend
    container_name: satu-cakrawala-backend
    restart: always
    ports:
      - "3002:3002"
    env_file:
      - ./backend/.env
    environment:
      # docker-network overrides (win over backend/.env)
      WAHA_BASE_URL: http://satu-cakrawala-waha:3000
      WEBHOOK_PUBLIC_URL: http://satu-cakrawala-backend:3002
      FRONTEND_DIR: /app/frontend
    volumes:
      - ./backend/data:/app/data            # SQLite persistence
      - ../waha-control:/app/frontend:ro    # serve the dashboard (frontend-only folder)
    depends_on:
      - waha
