services:
  waha:
    image: devlikeapro/waha:latest
    container_name: satu-cakrawala-waha
    restart: always
    env_file:
      - .env
    volumes:
      - ./.sessions:/app/.sessions
      - ./.media:/app/.media
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -H \"X-Api-Key: $WAHA_API_KEY\" http://localhost:3000/api/sessions || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=false"

networks:
  default:
    external: true
    name: dokploy-network
